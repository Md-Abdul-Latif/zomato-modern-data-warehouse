name: 'zomato_dbt'
version: '1.0.0'
config-version: 2

profile: 'zomato_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  zomato_dbt:

    bronze:
      +materialized: view
      +schema: STAGING
      +database: ZOMATO_DB

    silver:
      +materialized: table
      +schema: STAGING
      +database: ZOMATO_DB

    gold:
      +materialized: table
      +schema: ANALYTICS
      +database: ZOMATO_DB
