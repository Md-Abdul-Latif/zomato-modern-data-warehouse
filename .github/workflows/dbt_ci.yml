name: dbt CI Pipeline

on:
  pull_request:
    branches:
      - main
      - develop

  push:
    branches:
      - main
      - develop

  workflow_dispatch:

jobs:
  dbt-ci:
    name: dbt Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./dbt/zomato_dbt

    env:
      DBT_PROFILES_DIR: ~/.dbt

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-snowflake

      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt

          cat > ~/.dbt/profiles.yml << EOF
          zomato_dbt:
            target: ci

            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}

                warehouse: ZAMOTA_WH
                database: ZOMATO_DB
                schema: CI_${{ github.run_id }}

                threads: 4
                client_session_keep_alive: false
          EOF

      - name: Validate dbt Connection
        run: dbt debug --target ci

      - name: Install dbt Packages
        run: dbt deps

      - name: Parse dbt Project
        run: dbt parse --target ci

      - name: Run dbt Models
        run: dbt run --target ci

      - name: Run dbt Tests
        run: dbt test --target ci

      - name: Run dbt Snapshots
        run: dbt snapshot --target ci

      - name: Generate dbt Docs
        run: dbt docs generate --target ci
